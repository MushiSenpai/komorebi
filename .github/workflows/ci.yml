name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify generated code is up to date
        run: |
          dart run build_runner build --delete-conflicting-outputs
          git diff --exit-code lib/data/db/database.g.dart

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

  android:
    runs-on: ubuntu-latest
    needs: analyze-and-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Build release APK (debug-signed without a keystore)
        run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: komorebi-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14

  apple:
    # Verifies the iOS and macOS targets compile on every push; signing and
    # store upload happen on a Mac per docs/RELEASING.md.
    runs-on: macos-latest
    needs: analyze-and-test
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Build macOS
        run: flutter build macos --release
