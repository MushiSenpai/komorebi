name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify generated code is up to date
        run: |
          dart run build_runner build --delete-conflicting-outputs
          git diff --exit-code lib/data/db/database.g.dart

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test
